<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Storgata 23</title>
<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: "Arial Rounded MT Bold", "Arial Rounded MT", Arial, sans-serif;
  background: #f9f9f9;
  color: #333;
  padding: 20px;
}

.container {
  width: 100%;
  max-width: 800px;
  text-align: center;
}

img {
  max-width: 100%;
  height: auto;
  border-radius: 12px;
  margin-bottom: 1rem;
}

.language-switch {
  margin-bottom: 1.5rem;
}

.language-switch button {
  background: white;
  border: 2px solid #0078D4;
  color: #0078D4;
  border-radius: 50px;
  padding: 0.6rem 1.2rem;
  margin: 0.25rem;
  font-size: 1rem;
  cursor: pointer;
}

.language-switch button.active {
  background: #0078D4;
  color: white;
}

h1 {
  font-size: clamp(1.5rem, 4vw, 2.4rem);
  margin-bottom: 1.5rem;
}

.play-button {
  background-color: #0078D4;
  color: white;
  border: none;
  border-radius: 50px;
  padding: 1rem 2rem;
  font-size: clamp(1rem, 3vw, 1.2rem);
  cursor: pointer;
}

audio {
  margin-top: 2rem;
  width: 100%;
  max-width: 500px;
}
</style>
</head>

<body>
<div class="container">

  <img src="stop1.png" />

  <div class="language-switch">
    <button id="enBtn" class="active" onclick="setLanguage('en')">English</button>
    <button id="noBtn" onclick="setLanguage('no')">Norsk</button>
  </div>

  <h1 id="title">Architectural Highlights<br>Storgata 23</h1>

  <button id="playBtn" class="play-button" onclick="playAudio()">▶️ Play Audio</button>

  <audio id="audio" controls>
    <source id="audioSource" src="stop1.mp3" type="audio/mpeg" />
  </audio>

</div>

<script>
const content = {
  en: {
    title: "Architectural Highlights<br>Storgata 23",
    playButton: "▶️ Play Audio",
    audio: "stop1.mp3"
  },
  no: {
    title: "Arkitektoniske høydepunkter<br>Storgata 23",
    playButton: "▶️ Spill av lyd",
    audio: "rick.mp3"
  }
};

function setLanguage(language) {
  const title = document.getElementById("title");
  const playBtn = document.getElementById("playBtn");
  const audio = document.getElementById("audio");
  const audioSource = document.getElementById("audioSource");

  title.innerHTML = content[language].title;
  playBtn.textContent = content[language].playButton;

  audio.pause();
  audioSource.src = content[language].audio;
  audio.load();

  document.getElementById("enBtn").classList.toggle("active", language === "en");
  document.getElementById("noBtn").classList.toggle("active", language === "no");
}

function playAudio() {
  document.getElementById("audio").play();
}
</script>

</body>
</html>
