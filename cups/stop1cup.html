<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Storgata 23</title>
<style>
*{box-sizing:border-box}
body{
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Arial,sans-serif;
background:#f9f9f9;
padding:20px;
}
.container{
max-width:800px;
width:100%;
text-align:center;
}
img{max-width:100%;border-radius:12px;margin-bottom:20px;}
.language-switch button{
padding:10px 18px;
margin:5px;
border-radius:30px;
border:2px solid #0078D4;
background:#fff;
cursor:pointer;
}
.language-switch .active{
background:#0078D4;
color:#fff;
}
.play-button{
padding:15px 30px;
border:none;
border-radius:40px;
background:#0078D4;
color:white;
font-size:18px;
cursor:pointer;
}
</style>
</head>
<body>

<div class="container">

<img src="stop1.png" alt="Storgata 23">

<div class="language-switch">
<button id="enBtn" class="active" onclick="setLanguage('en')">English</button>
<button id="noBtn" onclick="setLanguage('no')">Norsk</button>
</div>

<h1 id="title">Architectural Highlights<br>Storgata 23</h1>

<button id="playBtn" class="play-button" onclick="playAudio()">▶️ Play Audio</button>

<audio id="audio"></audio>

</div>

<script>
let currentLanguage = "no";

const content = {
    en: {
        title: "Architectural Highlights<br>Storgata 23",
        button: "▶️ Play Audio",
        audio: "stop1.mp3"
    },
    no: {
        title: "Arkitektoniske høydepunkter<br>Storgata 23",
        button: "▶️ Spill av lyd",
        audio: "rick.mp3"
    }
};

function setLanguage(lang){
    currentLanguage = lang;

    document.getElementById("title").innerHTML = content[lang].title;
    document.getElementById("playBtn").innerHTML = content[lang].button;

    document.getElementById("enBtn").classList.toggle("active", lang==="en");
    document.getElementById("noBtn").classList.toggle("active", lang==="no");
}

function playAudio(){
    const audio = document.getElementById("audio");
    audio.pause();
    audio.currentTime = 0;
    audio.src = content[currentLanguage].audio;
    audio.load();
    audio.play();
}
</script>

</body>
</html>
