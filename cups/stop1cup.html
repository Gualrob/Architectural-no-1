<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Storgata 23</title>
<style>
*{box-sizing:border-box}
body{margin:0;min-height:100vh;display:flex;justify-content:center;align-items:center;background:#f9f9f9;font-family:Arial,sans-serif;padding:20px}
.container{max-width:800px;width:100%;text-align:center}
img{max-width:100%;border-radius:12px;margin-bottom:20px}
.language-switch{margin-bottom:20px}
.language-switch button{padding:10px 18px;margin:4px;border:2px solid #0078D4;border-radius:30px;background:#fff;color:#0078D4;cursor:pointer}
.language-switch button.active{background:#0078D4;color:#fff}
audio{width:100%;max-width:500px;margin-top:20px}
</style>
</head>
<body>
<div class="container">
<img src="stop1.png" alt="Storgata 23">
<div class="language-switch">
<button id="enBtn" class="active" onclick="setLanguage('en')">English</button>
<button id="noBtn" onclick="setLanguage('no')">Norsk</button>
</div>
<h1 id="title">Architectural Highlights<br>Storgata 23</h1>
<audio id="audio" controls preload="none"></audio>
</div>
<script>
const audio=document.getElementById("audio");
const content={
en:{title:"Architectural Highlights<br>Storgata 23",audio:"stop1.mp3"},
no:{title:"Arkitektoniske høydepunkter<br>Storgata 23",audio:"rick.mp3"}
};
function setLanguage(lang){
document.getElementById("title").innerHTML=content[lang].title;
document.getElementById("enBtn").classList.toggle("active",lang==="en");
document.getElementById("noBtn").classList.toggle("active",lang==="no");
audio.pause();
audio.currentTime=0;
audio.src=content[lang].audio;
audio.load();
}
window.onload=function(){setLanguage("en");};
</script>
</body>
</html>
